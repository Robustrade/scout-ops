name: Alert Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'diff'
        type: choice
        options:
          - diff
          - apply

env:
  ALERT_PLATFORM_URL: ${{ vars.ALERT_PLATFORM_URL }}
  ALERT_PLATFORM_TOKEN: ${{ secrets.ALERT_PLATFORM_TOKEN }}
  SPECS_REPO: ${{ vars.SPECS_REPO }}

permissions:
  contents: read

jobs:
  deploy-alerts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alerts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout specs repo
        if: ${{ env.SPECS_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SPECS_REPO }}
          path: specs
          token: ${{ secrets.SPECS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Ensure specs directory exists
        run: |
          if [ ! -d ../specs/teams ]; then
            echo "ERROR: specs/teams/ not found."
            echo "Set vars.SPECS_REPO to the specs repository, or commit specs/ locally in this repo."
            exit 1
          fi

      - name: Install grr
        run: |
          curl -fsSL https://github.com/grafana/grizzly/releases/latest/download/grr-linux-amd64 -o grr
          chmod +x grr
          sudo mv grr /usr/local/bin/

      - name: Configure grr
        run: |
            make config

      - name: Install jsonnet
        run: |
          sudo apt-get update
          sudo apt-get install -y jsonnet

      - name: Set workflow variables
        run: |
          echo "ACTION=${{ github.event.inputs.action }}" >> $GITHUB_ENV

      - name: Generate resources
        run: |
          echo "Generating resources for action: $ACTION"
          make generate

      - name: Show generated resources
        run: |
          echo "=== GENERATED RESOURCES ==="
          cat generated/resources.json

      - name: Preview changes (diff)
        if: ${{ env.ACTION == 'diff'}}
        run: |
          echo "=== DIFF ==="
          make diff

      - name: Apply changes
        if: ${{ env.ACTION == 'apply' && github.ref == 'refs/heads/main' }}
        run: |
          echo "=== APPLY ==="
          make apply
          echo "=== CHANGES APPLIED ==="
