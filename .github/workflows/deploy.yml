name: Alert Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'diff'
        type: choice
        options:
          - diff
          - apply

env:
  ALERT_PLATFORM_URL: ${{ vars.ALERT_PLATFORM_URL }}
  ALERT_PLATFORM_TOKEN: ${{ secrets.ALERT_PLATFORM_TOKEN }}
  SPECS_REPO: ${{ vars.SPECS_REPO }}

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      teams: ${{ steps.get-teams.outputs.teams }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover teams
        id: get-teams
        run: |
          teams=$(ls specs/teams | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "teams=$teams" >> $GITHUB_OUTPUT
          echo "Discovered teams: $teams"

  deploy:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        team: ${{ fromJson(needs.setup.outputs.teams) }}
      fail-fast: false
    defaults:
      run:
        working-directory: alerts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Checkout specs repo
      #   if: ${{ env.SPECS_REPO != '' }}
      #   uses: actions/checkout@v4
      #   with:
      #     repository: ${{ env.SPECS_REPO }}
      #     path: specs
      #     token: ${{ secrets.SPECS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install grr
        run: |
          curl -fsSL https://github.com/grafana/grizzly/releases/latest/download/grr-linux-amd64 -o grr
          chmod +x grr
          sudo mv grr /usr/local/bin/

      - name: Configure grr
        run: make config

      - name: Install jsonnet
        run: |
          sudo apt-get update
          sudo apt-get install -y jsonnet

      - name: Generate resources for ${{ matrix.team }}
        run: make generate TEAM=${{ matrix.team }}

      - name: Preview changes (diff) for ${{ matrix.team }}
        if: ${{ github.event.inputs.action == 'diff' }}
        run: grr diff generated/resources-${{ matrix.team }}.json

      - name: Apply changes for ${{ matrix.team }}
        if: ${{ github.event.inputs.action == 'apply' && github.ref == 'refs/heads/main' }}
        run: |
          grr apply generated/resources-${{ matrix.team }}.json
          echo "=== CHANGES APPLIED for ${{ matrix.team }} ==="
